[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Run tests in parallel across all cores by default (pytest-xdist). The suite is
# training-bound, so this cuts wall time several-fold with no change to what is
# tested. Pass "-n0" to disable (e.g. for pdb debugging): pytest -n0 -v
addopts = -n auto --tb=short